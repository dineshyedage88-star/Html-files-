<!DOCTYPE html>
<html>

<head>
    <title>Id Based Selector</title>
    <style>
        #r {
            color: red;
            font-size: 1cm;
            background-color: lightsalmon;
            text-align: center;
            text-decoration: underline;
            font-family: cursive;

        }

        #g {
            color: green;
            font-size: 1cm;
            background-color: lightgreen;
            text-align: center;
            text-decoration: underline;
            font-family: cursive;

        }

        #b {
            color: blue;
            font-size: 1cm;
            background-color: lightblue;
            text-align: center;
            text-decoration: underline;
            font-family: cursive;
        }

        #y {
            color: yellow;
            background-color: rgb(221, 221, 140);
            font-size: 1cm;
            text-align: center;
            text-decoration: underline;
            font-family: cursive;
        }
    </style>
</head>

<body>
    <p id="r">Paragraph_1</p>
    <p id="g">Paragraph_2</p>
    <p id="b">Paragraph_3</p>

    <p id="r">Red Ross</p>
    <p id="b">Blue Rose</p>
    <p id="y">Yellow Rose</p>
</body>

</html>
