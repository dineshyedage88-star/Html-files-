    <!-- Highlight the text -->

    <!-- bold the text -->
    <b>bold</b><br>
    <!-- italic the text -->

    <!-- underline the text -->

    <!-- <u>Underline</u><br> -->

    <!-- subscript used for chemistry formulas-->

</html>
