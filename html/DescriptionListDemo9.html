<html>

<head>
    <title>Document</title>
</head>

<body>
    <div>
        <!-- Description List (dl) Used for creating a list of terms and their definitions
              and used to display terms and their definitions -->
        <!-- Description term (dt)  used for defining a term or title
           It is used inside the description list -->
        <!-- Description data (dd)  used for providing the definition or explanation of the term and also it is used inside the description list -->
        <dl>
            <dt><b>Earth:</b></dt>
            <dd><i>Earth is planet where human beings lived.</i></dd>
        </dl>

        <dl>
            <dt><b>Java:</b></dt>
            <dd><i>Java is a programming language.</i></dd>
        </dl>
    </div>
</body>

</html>
